  <path d="M 40 135 L 60 145 L 80 135 L 100 145 L 120 135 L 140 145" stroke="#654321" stroke-width="4" fill="none"/>
  
  <!-- Music notes -->
  <circle cx="140" cy="40" r="15" fill="#2563EB"/>
  <ellipse cx="140" cy="40" rx="10" ry="7" fill="#1E40AF"/>
  <rect x="150" y="25" width="4" height="30" fill="#1E40AF"/>
  
  <circle cx="50" cy="50" r="12" fill="#2563EB"/>
  <ellipse cx="50" cy="50" rx="8" ry="5" fill="#1E40AF"/>
  <rect x="58" y="38" width="3" height="24" fill="#1E40AF"/>
