  <!-- Harmonium body -->
  <rect x="30" y="70" width="120" height="80" rx="8" fill="#8B4513" stroke="#654321" stroke-width="3"/>
  
  <!-- Keyboard keys (white) -->
  <rect x="40" y="80" width="12" height="30" fill="white" stroke="#333" stroke-width="2"/>
  <rect x="55" y="80" width="12" height="30" fill="white" stroke="#333" stroke-width="2"/>
  <rect x="70" y="80" width="12" height="30" fill="white" stroke="#333" stroke-width="2"/>
  <rect x="85" y="80" width="12" height="30" fill="white" stroke="#333" stroke-width="2"/>
  <rect x="100" y="80" width="12" height="30" fill="white" stroke="#333" stroke-width="2"/>
  <rect x="115" y="80" width="12" height="30" fill="white" stroke="#333" stroke-width="2"/>
  <rect x="130" y="80" width="12" height="30" fill="white" stroke="#333" stroke-width="2"/>
  
  <!-- Black keys -->
  <rect x="48" y="80" width="8" height="20" fill="#222"/>
